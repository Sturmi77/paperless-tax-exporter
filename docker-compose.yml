services:
  paperless-tax-exporter:
    image: ghcr.io/sturmi77/paperless-tax-exporter:latest
    container_name: paperless-tax-exporter
    restart: unless-stopped
    pull_policy: always                 # Dockhand zieht beim Deploy immer das neueste Image
    ports:
      - "5055:5000"
    environment:
      PAPERLESS_URL: ${PAPERLESS_URL}
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN}
      OUTPUT_DIR: /output
      TZ: Europe/Vienna
    volumes:
      - /volume1/downloads/steuerberater:/output
