name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:        # Manueller Trigger aus GitHub UI möglich

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # → ghcr.io/sturmi77/paperless-tax-exporter

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # Nötig für ghcr.io Push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta (Tags & Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Bei Push auf main → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Bei Git-Tag v1.2.3 → :1.2.3 und :1.2 und :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Immer auch den Commit-SHA als Tag
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Automatisch vorhanden, kein manuelles Secret nötig

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64    # amd64 für DS923+, arm64 für andere NAS
          no-cache: true                         # Kein Cache – stellt sicher dass App-Dateien immer neu gebaut werden
